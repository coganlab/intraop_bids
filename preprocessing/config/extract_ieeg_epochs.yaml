bids_root: ???
# bids_root: ~/cworkspace/BIDS_1.0_Lexical_µECoG/BIDS

patient: ???
# patient: S41

task: ???
# task: lexical

load_kwargs:
  # passed to raw_from_layout
  preload: true

reference: CAR

sig_channels: true

# Per-channel trial QC (bad trial-channel pairs are NaN-masked, not dropped)
trial_selection:
  method: 1
  threshold: 10
# trial_selection:
#   method: 2
#   threshold: 30


task_periods:
  - perception
  - production

features:
  - high_gamma
  - spike_band

# Phoneme-level processing (set to true to swap to phonemeLevel raw
# for feature extraction; QC still runs on the main raw)
phoneme_level: false
derivative_name: phonemeLevel

# Spatial-average mode: when enabled, the raw input is loaded from the
# derivatives/spatialAvg/ recording produced by spatial_avg_raw.py
# (no preprocessing applied before averaging).  This script then runs
# the full preprocessing pipeline (outlier detection + notch + CAR)
# on the averaged data and writes epochs to
# derivatives/epoch(spatialAvgContact{N})({reference})/.
spatial_avg:
  enabled: false
  contact_size: null            # required when enabled
  derivative_name: spatialAvg