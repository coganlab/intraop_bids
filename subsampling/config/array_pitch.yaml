# Electrode array metadata used by the subsampling package.
#
# `pitch_mm` is the center-to-center spacing between physical contacts
# on the array (used to scale electrode count for pitch subsampling).
# `grid_dims` is informational only -- the actual chanmap shape is
# derived per-subject from channels.tsv via `load_chanmap`.
#
# TODO(user): verify these values against array documentation.  The
# defaults below are based on typical Duke uECoG geometries but should
# be confirmed before running real analyses.

128-strip:
  pitch_mm: 0.2
  grid_dims: [1, 128]  # placeholder; verify per-strip layout

256-grid:
  pitch_mm: 0.4
  grid_dims: [8, 32]

256-strip:
  pitch_mm: 0.4
  grid_dims: [8, 32]

256-strip-old:
  pitch_mm: 0.4
  grid_dims: [8, 32]

512-grid-old:
  pitch_mm: 0.2
  grid_dims: [16, 32]

1024-grid-S82:
  pitch_mm: 0.2
  grid_dims: [32, 32]

hybrid-strip:
  pitch_mm: 0.2
  grid_dims: [2, 64]   # placeholder; hybrid layouts vary

hybrid-strip-old:
  pitch_mm: 0.2
  grid_dims: [2, 64]   # placeholder; hybrid layouts vary
