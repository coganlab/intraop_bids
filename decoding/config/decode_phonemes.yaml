bids_root: ???
patient: ???
task: ???

phoneme_idx: -1    # -1 for all phonemes, 1..N for specific position
n_phons: 5

# BIDS file matching
description: productionMeanSub
suffix: highgamma
extension: .fif
datatype: "epoch(band)(power)"

# Decoding parameters
n_folds: 20
n_iter: 50
compute_chance: false

# Time window (null = full epoch, or [tmin, tmax] e.g. [-0.5, 0.5])
time_window: null

# Model hyperparameters
pca_variance: 0.8
svm_kernel: rbf

# Output (null = auto-derived from bids_root)
results_root: null
